name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag starting with 'v' (like v26.1.1.0)

jobs:
  build-n-publish:
    name: Build and publish Python distro to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # CRITICAL: This is required for PyPI Trusted Publishing (no passwords needed!)
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build binary wheel and source tarball
      run: python -m build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1  # <-- FIXED THIS LINE!